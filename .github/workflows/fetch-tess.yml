name: Fetch TESS Materials

on:
  push:
    branches:
      - main
  workflow_dispatch:
  
jobs:
  fetch-materials:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Fetch TESS materials
        run: python scripts/fetch_tess_materials.py

      - name: Upload response artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tess-response
          path: output/

